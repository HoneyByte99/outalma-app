# Analysis options for Outalma.
# Based on flutter_lints with targeted additions for the MVP quality bar.
#
# Rules philosophy:
#   - Correctness rules are errors (catch bugs)
#   - Code quality rules are warnings (block CI)
#   - Style rules are infos (visible in IDE, don't block CI)

include: package:flutter_lints/flutter.yaml

analyzer:
  # Exclude generated code and Firebase auto-generated files.
  exclude:
    - lib/firebase_options.dart
    - lib/l10n/app_localizations*.dart
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/generated/**"

  errors:
    # Treat these as hard errors — they represent definite bugs.
    missing_required_param: error
    missing_return: error
    dead_code: warning

linter:
  rules:
    # -------------------------------------------------------------------------
    # Correctness — these catch real bugs
    # -------------------------------------------------------------------------

    # Forces use of debugPrint (or a logger) instead of print(),
    # which leaks to production logs.
    avoid_print: true

    # Catch fire-and-forget async calls that swallow errors silently.
    unawaited_futures: true

    # Warn when a StreamSubscription is not stored and cancelled.
    cancel_subscriptions: true

    # Warn when a StreamController (or Sink) is never closed.
    close_sinks: true

    # -------------------------------------------------------------------------
    # Code quality — improve reliability without massive churn
    # -------------------------------------------------------------------------

    # Avoid returning a Future from a function that immediately awaits it.
    unnecessary_await_in_return: true

    # Detects assignments whose value is never used.
    avoid_unused_constructor_parameters: true

    # Prevent calling methods on dynamic — forces proper typing.
    avoid_dynamic_calls: true

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------

    # Promote const where the analyzer already suggests it (infos → warnings).
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true

    # Replace Container(color: …) with ColoredBox when there's no other need.
    use_colored_box: true
