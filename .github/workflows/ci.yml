name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Pinned to match the local dev environment (Dart 3.11.3).
  # pubspec.yaml requires sdk: ^3.11.3 — update this when upgrading Flutter.
  FLUTTER_VERSION: "3.41.5"

jobs:
  functions:
    name: Functions · Build · Lint · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # The Firestore/Auth emulators (spawned by `npm test` via
      # firebase emulators:exec) require a JRE.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Test (emulator-backed jest)
        run: npm test

  quality:
    name: Format · Analyze · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Firebase config injection ──────────────────────────────────────────
      # Files are gitignored. Stored as base64-encoded GitHub Secrets.
      # To update secrets locally:
      #   base64 -i ios/Runner/GoogleService-Info.plist | gh secret set GOOGLE_SERVICE_INFO_PLIST
      #   base64 -i android/app/google-services.json   | gh secret set GOOGLE_SERVICES_JSON
      #   base64 -i lib/firebase_options.dart           | gh secret set FIREBASE_OPTIONS_DART
      - name: Inject Firebase config
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
          echo "$GOOGLE_SERVICES_JSON"       | base64 --decode > android/app/google-services.json
          echo "$FIREBASE_OPTIONS_DART"      | base64 --decode > lib/firebase_options.dart

      # ── Maps API key injection ─────────────────────────────────────────────
      # MAPS_API_KEY — unified Google Maps SDK + Places HTTP key, consumed by
      # Dart (via --dart-define / String.fromEnvironment), iOS (Secrets.xcconfig)
      # and Android (local.properties).
      - name: Inject Maps config
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          # Android: build.gradle.kts reads MAPS_API_KEY from local.properties
          # or System.getenv — writing local.properties covers both paths.
          echo "MAPS_API_KEY=$MAPS_API_KEY" >> android/local.properties
          # iOS: Secrets.xcconfig is read by the Xcode build via xcconfig chain.
          echo "MAPS_API_KEY = $MAPS_API_KEY" > ios/Flutter/Secrets.xcconfig

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # ── Format ────────────────────────────────────────────────────────────
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/

      # ── Analyze ───────────────────────────────────────────────────────────
      - name: Analyze
        run: flutter analyze --fatal-warnings

      # ── Test ──────────────────────────────────────────────────────────────
      - name: Test
        run: |
          flutter test --coverage --reporter expanded \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}

      # ── Coverage ──────────────────────────────────────────────────────────
      # Graduated threshold: raise floor as coverage improves.
      # Current target: 25%. Next: 35% → 45%.
      - name: Coverage threshold check
        run: |
          sudo apt-get install -y lcov --quiet
          pct=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | grep -oP '[\d.]+(?=%)' | head -1)
          echo "Line coverage: ${pct}%"
          if [ -z "$pct" ]; then echo "Could not parse coverage"; exit 1; fi
          result=$(echo "$pct < 25" | bc -l)
          if [ "$result" -eq 1 ]; then
            echo "Coverage ${pct}% is below the 25% threshold"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
