name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Pinned to match the local dev environment (Dart 3.11.3).
  # pubspec.yaml requires sdk: ^3.11.3 — update this when upgrading Flutter.
  FLUTTER_VERSION: "3.41.5"

jobs:
  quality:
    name: Format · Analyze · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Firebase config injection ──────────────────────────────────────────
      # These files are gitignored to keep API keys out of version control.
      # Store base64-encoded file contents as GitHub Secrets (Settings > Secrets):
      #   GOOGLE_SERVICE_INFO_PLIST  — base64 of ios/Runner/GoogleService-Info.plist
      #   GOOGLE_SERVICES_JSON       — base64 of android/app/google-services.json
      #   FIREBASE_OPTIONS_DART      — base64 of lib/firebase_options.dart
      # Generate with: base64 -i GoogleService-Info.plist | pbcopy
      - name: Inject Firebase config
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
          echo "$GOOGLE_SERVICES_JSON"       | base64 --decode > android/app/google-services.json
          echo "$FIREBASE_OPTIONS_DART"      | base64 --decode > lib/firebase_options.dart

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # ── Format ────────────────────────────────────────────────────────────
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/

      # ── Analyze ───────────────────────────────────────────────────────────
      - name: Analyze
        run: flutter analyze --fatal-warnings

      # ── Test ──────────────────────────────────────────────────────────────
      - name: Test
        run: flutter test --coverage --reporter expanded --dart-define=PLACES_API_KEY=${{ secrets.PLACES_API_KEY }}

      # ── Coverage ──────────────────────────────────────────────────────────
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
